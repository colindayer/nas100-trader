# ────────────────────────────────────────────────────────────────────────────
# TEMPLATE — copy this file to  config.ini  and fill in your own credentials.
#   cp config.example.ini config.ini
# config.ini is gitignored and stays ONLY on your machine. Never commit it,
# never paste its contents into a chat. The broker adapters read from it locally.
# ────────────────────────────────────────────────────────────────────────────

[alpaca]
# Paper trading keys from https://app.alpaca.markets (Paper account)
key        = YOUR_ALPACA_PAPER_KEY
secret     = YOUR_ALPACA_PAPER_SECRET
base_url   = https://paper-api.alpaca.markets
risk_scale = 1.0

[ctrader]
# FTMO via cTrader Open API. Get these from cTrader:
#   Settings -> "FIX API / Open API"  (or https://openapi.ctrader.com to register an app)
# You need an application (client id + secret) AND an access token for your account.
account_id    = 17143495          # your cTrader account number (not secret)
client_id     = YOUR_CTRADER_CLIENT_ID
client_secret = YOUR_CTRADER_CLIENT_SECRET
access_token  = YOUR_CTRADER_ACCESS_TOKEN
host          = demo              # 'demo' for the FTMO free trial, 'live' later
risk_scale    = 1.0              # FTMO ~10% max DD fits our system at full size

[tradovate]
# Optional futures path (Apex/Topstep via Tradovate). Fill later if you go futures.
name        = YOUR_TRADOVATE_USERNAME
password    = YOUR_TRADOVATE_PASSWORD
app_id      = YOUR_TRADOVATE_APP_ID
app_secret  = YOUR_TRADOVATE_APP_SECRET
base_url    = https://demo.tradovateapi.com/v1
risk_scale  = 0.5               # tight trailing DD -> half size

[risk]
target_drawdown    = 0.06   # DD-throttle target cap (conformal overlay)
# Kill-switch: halt new orders if session loss exceeds this fraction
daily_loss_limit    = 0.05      # 5% daily loss → no more orders this session
session_start_equity = 0        # set at session start; 0 = disable kill-switch

[alerts]
# Leave blank to use console-only mode (default). Fill in at least ONE channel.
# Telegram: create a bot via @BotFather, then /getid your chat
telegram_token = YOUR_TELEGRAM_BOT_TOKEN
chat_id        = YOUR_TELEGRAM_CHAT_ID
# Email (SMTP): Gmail example shown; use an App Password if 2FA is on
smtp_host      = smtp.gmail.com
smtp_port      = 587
smtp_user      = YOUR_EMAIL@gmail.com
smtp_pass      = YOUR_APP_PASSWORD
to_email       = YOUR_EMAIL@gmail.com

[binance]
# Spot API keys from binance.com (enable Spot trading; restrict to your IP).
# Public market data (get_bars) works without these; trading needs them.
key        = YOUR_BINANCE_KEY
secret     = YOUR_BINANCE_SECRET
base_url   = https://api.binance.com
risk_scale = 1.0
