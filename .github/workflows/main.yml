name: Paper Trade (Alpaca)
on:
  schedule:
    - cron: "30 7 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}
jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python live_trader.py --broker alpaca --session all
